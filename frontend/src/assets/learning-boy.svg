<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520" fill="none">
  <defs>
    <linearGradient id="hoodie" x1="160" y1="260" x2="360" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A5D"/>
      <stop offset="1" stop-color="#FF6A6F"/>
    </linearGradient>
    <radialGradient id="skin" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(255 206) rotate(120) scale(120 130)">
      <stop stop-color="#FFE2C9"/>
      <stop offset="1" stop-color="#ECA26C"/>
    </radialGradient>
    <linearGradient id="hair" x1="186" y1="118" x2="350" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B2A3F"/>
      <stop offset="1" stop-color="#1F1726"/>
    </linearGradient>
    <linearGradient id="shadow" x1="162" y1="420" x2="362" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- soft base shadow -->
  <ellipse cx="260" cy="448" rx="160" ry="42" fill="url(#shadow)"/>

  <!-- head -->

services:
  - type: web
    name: learnox-backend
    env: node
    # Deploy the full stack as a single service:
    # - Builds the Vite frontend
    # - Serves the built assets from the Express backend
    rootDir: .
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
